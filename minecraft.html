<!DOCTYPE html>
<html lang="en" style="width:100%;height:100%;background:#0d0d0d;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
  <title>Minecraft – The Vault</title>
  <link rel="shortcut icon" type="image/png" href="https://cdn.jsdelivr.net/gh/genizy/mc@main/shared/game.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d0d0d;
      font-family: 'Inter', system-ui, sans-serif;
      color: #e0e0e0;
    }

    /* ── Launcher ── */
    #launcher {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      image-rendering: pixelated;
      opacity: 0.9;
    }

    .logo-text {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #555;
    }

    .version-grid {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .version-card {
      width: 200px;
      background: #161616;
      border: 1px solid #242424;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      padding: 1.25rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      position: relative;
      overflow: hidden;
    }

    .version-card:hover { border-color: #3a3a3a; background: #1c1c1c; }
    .version-card:active { background: #202020; }

    .card-tag {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .card-tag.stable { color: #3d7a3d; }
    .card-tag.newer  { color: #3a6080; }

    .card-version {
      font-size: 1.6rem;
      font-weight: 300;
      color: #d0d0d0;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .card-desc {
      font-size: 0.7rem;
      color: #444;
      line-height: 1.5;
    }

    .card-arrow {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      font-size: 0.85rem;
      color: #2e2e2e;
      transition: color 0.15s, transform 0.15s;
    }

    .version-card:hover .card-arrow { color: #555; transform: translate(2px, -2px); }

    .hint {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #2e2e2e;
    }

    /* ── Game screen ── */
    #game-screen {
      display: none;
      width: 100%; height: 100%;
      position: relative;
      background: #000;
    }

    #game-frame {
      width: 100%; height: 100%;
      border: none;
      display: block;
      position: absolute;
      top: 0; left: 0;
    }

    /* Click-catcher: transparent, sits on top of the iframe.
       The browser requires a REAL user click inside a cross-origin iframe
       before it will send keyboard events to it — programmatic .focus() is
       not enough. When shown, this overlay intercepts the next click and
       forwards it as a real pointer event into the iframe via dispatchEvent,
       then removes itself so gameplay continues uninterrupted. */
    #click-catcher {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 10;
      cursor: pointer;
      background: transparent;
    }

    #click-catcher.visible { display: block; }

    /* Toast: tells the user to click back in */
    #focus-toast {
      display: none;
      position: absolute;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      border: 1px solid #2a2a2a;
      border-radius: 5px;
      padding: 0.45rem 1rem;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #888;
      pointer-events: none;
      z-index: 11;
      white-space: nowrap;
      animation: fadeUp 0.2s ease;
    }

    #focus-toast.visible { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(5px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Back button */
    .back-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 20;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #333;
      background: transparent;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .back-btn:hover { color: #888; border-color: #3a3a3a; }
  </style>
</head>
<body>

  <!-- ── Launcher ── -->
  <div id="launcher">
    <div class="logo-wrap">
      <img class="logo-icon" src="https://cdn.jsdelivr.net/gh/genizy/mc@main/shared/game.png" alt="Minecraft">
      <span class="logo-text">Minecraft</span>
    </div>

    <div class="version-grid">
      <div class="version-card" onclick="launch('1.8.8')">
        <span class="card-tag stable">Most Stable</span>
        <span class="card-version">1.8.8</span>
        <span class="card-desc">EaglercraftX — singleplayer &amp; multiplayer</span>
        <span class="card-arrow">↗</span>
      </div>

      <div class="version-card" onclick="launch('1.12.2')">
        <span class="card-tag newer">Newer Build</span>
        <span class="card-version">1.12.2</span>
        <span class="card-desc">Eaglercraft — modern features &amp; mechanics</span>
        <span class="card-arrow">↗</span>
      </div>
    </div>

    <span class="hint">Select a version to play</span>
  </div>

  <!-- ── Game screen ── -->
  <div id="game-screen">
    <button class="back-btn" onclick="goBack()">← Back</button>


    <iframe
      id="game-frame"
      allow="fullscreen; pointer-lock"
      allowfullscreen
      sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-forms allow-popups"
    ></iframe>
  </div>

  <script>
    const VERSIONS = {
      '1.8.8':  'https://eaglercraft1-8.github.io/',
      '1.12.2': 'https://eaglercraftx1-8.github.io/eagler-files/1.12/Main/index.html'
    };

    const launcher     = document.getElementById('launcher');
    const gameScreen   = document.getElementById('game-screen');
    const gameFrame    = document.getElementById('game-frame');
    const catcher      = document.getElementById('click-catcher');
    const toast        = document.getElementById('focus-toast');

    let gameActive       = false;
    let toastTimeout     = null;

    /* ── Show / hide the click-catcher + toast ── */
    function showCatcher() {
      catcher.classList.add('visible');
      toast.classList.add('visible');
      clearTimeout(toastTimeout);
      /* Auto-hide toast after 4s so it doesn't linger forever */
      toastTimeout = setTimeout(function() {
        toast.classList.remove('visible');
      }, 4000);
    }

    function hideCatcher() {
      catcher.classList.remove('visible');
      toast.classList.remove('visible');
      clearTimeout(toastTimeout);
    }

    /* When the user clicks the catcher, hide it and pass a real synthetic
       click through to the iframe. The browser sees this as a genuine user
       interaction with the iframe and restores keyboard event routing. */
    catcher.addEventListener('click', function(e) {
      hideCatcher();
      /* Fire a real click at the same coordinates into the iframe */
      try {
        var rect = gameFrame.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var y = e.clientY - rect.top;
        var synth = new MouseEvent('click', {
          bubbles: true, cancelable: true,
          clientX: e.clientX, clientY: e.clientY,
          screenX: e.screenX, screenY: e.screenY
        });
        gameFrame.dispatchEvent(synth);
      } catch(err) {}
      gameFrame.focus();
    });

    /* ── Launch / back ── */
    function launch(version) {
      gameFrame.src = VERSIONS[version];
      launcher.style.display = 'none';
      gameScreen.style.display = 'block';
      hideCatcher();
      gameActive = true;
    }

    function goBack() {
      gameActive = false;
      hideCatcher();
      gameFrame.src = 'about:blank';
      gameScreen.style.display = 'none';
      launcher.style.display = 'flex';
    }

    /* ── Detect keyboard focus loss on this document ──
       When the browser window's fullscreen button is clicked, focus lands
       on the parent Vault page (outside this iframe). From minecraft.html's
       perspective, the document fires a 'blur' event.
       When the content-only fullscreen button is used, fullscreenchange fires.
       Both trigger showCatcher() so the user gets a clear prompt to click back. */
    window.addEventListener('blur', function() {
      if (!gameActive) return;
      /* Small delay — blur fires briefly during legit in-game interactions too */
      setTimeout(function() {
        if (gameActive) showCatcher();
      }, 300);
    });

    window.addEventListener('focus', function() {
      /* Window regained focus — but keyboard might still be broken if the
         cross-origin iframe hasn't had a real click. Keep catcher visible
         so the user clicks through properly. */
    });

    /* Fullscreen change also steals focus */
    function onFullscreenChange() {
      if (!gameActive) return;
      setTimeout(function() {
        if (gameActive) showCatcher();
      }, 150);
    }

    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);
    document.addEventListener('mozfullscreenchange', onFullscreenChange);

    /* ── Alt + ` → signal Vault to toggle fullscreen ── */
    document.addEventListener('keydown', function(e) {
      if (e.altKey && e.key === '`') {
        e.preventDefault();
        try { parent.postMessage({ type: 'toggleFullscreen' }, '*'); } catch(err) {}
      }
    });

    /* ── postMessage passthrough from game iframe ── */
    window.addEventListener('message', function(evt) {
      if (!evt.data) return;
      if (evt.data.type === 'toggleFullscreen') {
        try { parent.postMessage({ type: 'toggleFullscreen' }, '*'); } catch(err) {}
      }
    });
  </script>
</body>
</html>
