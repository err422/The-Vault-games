<!DOCTYPE html>
<html lang="en" style="width:100%;height:100%;background:#0d0d0d;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
  <title>Minecraft – The Vault</title>
  <link rel="shortcut icon" type="image/png" href="https://cdn.jsdelivr.net/gh/genizy/mc@main/shared/game.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d0d0d;
      font-family: 'Inter', system-ui, sans-serif;
      color: #e0e0e0;
    }

    #launcher {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      image-rendering: pixelated;
      opacity: 0.9;
    }

    .logo-text {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #555;
    }

    .version-grid {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .version-card {
      width: 200px;
      background: #161616;
      border: 1px solid #242424;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      padding: 1.25rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      position: relative;
      overflow: hidden;
    }

    .version-card:hover {
      border-color: #3a3a3a;
      background: #1c1c1c;
    }

    .version-card:active { background: #202020; }

    .card-tag {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
    }

    .card-tag.stable { color: #3d7a3d; }
    .card-tag.newer  { color: #3a6080; }

    .card-version {
      font-size: 1.6rem;
      font-weight: 300;
      color: #d0d0d0;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .card-desc {
      font-size: 0.7rem;
      color: #444;
      line-height: 1.5;
    }

    .card-arrow {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      font-size: 0.85rem;
      color: #2e2e2e;
      transition: color 0.15s, transform 0.15s;
    }

    .version-card:hover .card-arrow {
      color: #555;
      transform: translate(2px, -2px);
    }

    .hint {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #2e2e2e;
    }

    #game-screen {
      display: none;
      width: 100%; height: 100%;
      position: relative;
      background: #000;
    }

    #game-frame {
      width: 100%; height: 100%;
      border: none;
      display: block;
    }

    #pointer-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.75rem;
      cursor: pointer;
      z-index: 10;
    }

    #pointer-overlay.visible { display: flex; }

    .overlay-title {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ccc;
    }

    .overlay-sub {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #444;
    }

    .back-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 20;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #333;
      background: transparent;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .back-btn:hover { color: #888; border-color: #3a3a3a; }
  </style>
</head>
<body>

  <div id="launcher">
    <div class="logo-wrap">
      <img class="logo-icon" src="https://cdn.jsdelivr.net/gh/genizy/mc@main/shared/game.png" alt="Minecraft">
      <span class="logo-text">Minecraft</span>
    </div>

    <div class="version-grid">
      <div class="version-card" onclick="launch('1.8.8')">
        <span class="card-tag stable">Most Stable</span>
        <span class="card-version">1.8.8</span>
        <span class="card-desc">EaglercraftX — singleplayer &amp; multiplayer</span>
        <span class="card-arrow">↗</span>
      </div>

      <div class="version-card" onclick="launch('1.12.2')">
        <span class="card-tag newer">Newer Build</span>
        <span class="card-version">1.12.2</span>
        <span class="card-desc">Eaglercraft — modern features &amp; mechanics</span>
        <span class="card-arrow">↗</span>
      </div>
    </div>

    <span class="hint">Select a version to play</span>
  </div>

  <div id="game-screen">
    <button class="back-btn" onclick="goBack()">← Back</button>

    <div id="pointer-overlay">
      <span class="overlay-title">Click to Resume</span>
      <span class="overlay-sub">Mouse focus lost</span>
    </div>

    <iframe
      id="game-frame"
      allow="fullscreen; pointer-lock"
      allowfullscreen
      sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-forms allow-popups"
    ></iframe>
  </div>

  <script>
    const VERSIONS = {
      '1.8.8':  'https://eaglercraft1-8.github.io/',
      '1.12.2': 'https://eaglercraftx1-8.github.io/eagler-files/1.12/Main/index.html'
    };

    const launcher        = document.getElementById('launcher');
    const gameScreen      = document.getElementById('game-screen');
    const gameFrame       = document.getElementById('game-frame');
    const pointerOverlay  = document.getElementById('pointer-overlay');

    let pointerWasLocked = false;
    let overlayTimeout   = null;

    function refocusGame() {
      gameFrame.focus();
      try { gameFrame.contentWindow.focus(); } catch(e) {}
    }

    function launch(version) {
      gameFrame.src = VERSIONS[version];
      launcher.style.display = 'none';
      gameScreen.style.display = 'block';
      pointerOverlay.classList.remove('visible');
      pointerWasLocked = false;
      gameFrame.addEventListener('load', function onLoad() {
        gameFrame.removeEventListener('load', onLoad);
        refocusGame();
      }, { once: true });
    }

    function goBack() {
      gameFrame.src = 'about:blank';
      pointerOverlay.classList.remove('visible');
      pointerWasLocked = false;
      clearTimeout(overlayTimeout);
      gameScreen.style.display = 'none';
      launcher.style.display = 'flex';
    }

    function onPointerLockChange() {
      if (gameScreen.style.display !== 'block') return;
      const locked = !!(document.pointerLockElement || document.mozPointerLockElement);
      if (locked) {
        pointerWasLocked = true;
        hideOverlay();
      } else if (pointerWasLocked) {
        showOverlay();
      }
    }

    document.addEventListener('pointerlockchange', onPointerLockChange);
    document.addEventListener('mozpointerlockchange', onPointerLockChange);

    function showOverlay() {
      clearTimeout(overlayTimeout);
      pointerOverlay.classList.add('visible');
    }

    function hideOverlay() {
      clearTimeout(overlayTimeout);
      pointerOverlay.classList.remove('visible');
    }

    pointerOverlay.addEventListener('click', function() {
      hideOverlay();
      refocusGame();
      try {
        gameFrame.contentDocument?.documentElement?.requestPointerLock?.();
      } catch(e) {}
    });

    function onFullscreenChange() {
      if (gameScreen.style.display !== 'block') return;
      setTimeout(refocusGame, 80);
    }

    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);
    document.addEventListener('mozfullscreenchange', onFullscreenChange);

    document.addEventListener('keydown', function(e) {
      if (e.altKey && e.key === '`') {
        e.preventDefault();
        try { parent.postMessage({ type: 'toggleFullscreen' }, '*'); } catch(e) {}
      }
      if (e.key === 'Escape' && gameScreen.style.display === 'block') {
        clearTimeout(overlayTimeout);
        overlayTimeout = setTimeout(function() {
          const locked = !!(document.pointerLockElement || document.mozPointerLockElement);
          if (!locked && pointerWasLocked) showOverlay();
        }, 150);
      }
    });

    window.addEventListener('message', function(evt) {
      if (!evt.data) return;
      if (evt.data.type === 'toggleFullscreen') {
        try { parent.postMessage({ type: 'toggleFullscreen' }, '*'); } catch(e) {}
      }
    });
  </script>
</body>
</html>
